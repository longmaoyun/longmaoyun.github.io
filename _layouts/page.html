---
layout: default
---

{% include breadcrumb.html %}

<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="max-w-4xl mx-auto">
    <div class="prose prose-lg max-w-none
                prose-headings:text-gray-900 dark:prose-headings:text-gray-100
                prose-a:text-blue-600 dark:prose-a:text-blue-400
                prose-strong:text-gray-900 dark:prose-strong:text-gray-100
                prose-code:text-pink-600 dark:prose-code:text-pink-400
                prose-pre:bg-gray-100 dark:prose-pre:bg-gray-800
                prose-blockquote:border-blue-500 dark:prose-blockquote:border-blue-400
                prose-blockquote:bg-blue-50 dark:prose-blockquote:bg-blue-900/20
                prose-img:rounded-xl
                dark:text-gray-300">
      <!-- TOC -->
      {% if page.toc != false %}
      <div class="toc-wrapper bg-gray-50 dark:bg-gray-800/50 rounded-xl p-6 mb-8 border border-gray-200 dark:border-gray-700" id="table-of-contents">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-4">
          <i class="fas fa-list-ul mr-2 text-blue-500"></i>目录
        </h2>
        <nav id="toc" class="toc">
          <ul class="space-y-1 text-gray-600 dark:text-gray-400">
            <!-- TOC auto-generated by JS -->
          </ul>
        </nav>
      </div>
      {% endif %}

      <!-- Page Content -->
      <article class="page-content">
        {{ content }}
      </article>
    </div>

    <!-- CTA Section -->
    {% include cta.html %}
  </div>
</div>

{% if page.toc != false %}
<script>
(function() {
  var toc = document.querySelector('#toc ul');
  if (!toc) return;
  var headings = document.querySelectorAll('.page-content h2, .page-content h3');
  if (headings.length === 0) { toc.closest('.toc-wrapper').style.display = 'none'; return; }

  headings.forEach(function(h, index) {
    if (!h.id) {
      h.id = 'section-' + (index + 1);
    }
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition-colors duration-200 text-sm';
    if (h.tagName === 'H3') {
      a.style.paddingLeft = '1.5rem';
      a.style.fontSize = '0.875rem';
    }
    li.appendChild(a);
    toc.appendChild(li);
  });
})();
</script>
{% endif %}
