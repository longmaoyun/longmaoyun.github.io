# ─── 龙猫云机场 - Jekyll Config ───

title: 龙猫云机场
tagline: 高速稳定的网络加速服务
description: >-
  龙猫云机场提供高速稳定的网络加速服务，覆盖全球多个节点，
  支持全平台客户端，畅享无障碍网络体验。龙猫云，畅享全球互联。
url: "https://longmaoyun.github.io"
baseurl: ""

# ─── 社交 ───
author: 龙猫云机场
logo: /assets/img/logo.png
social:
  name: 龙猫云机场
  links:
    - https://github.com/longmaoyun
    - https://t.me/longmaoyun

# ─── 主题设置 ───
timezone: Asia/Shanghai
lang: zh-CN
markdown: kramdown
highlighter: rouge

# ─── 插件（github-pages 已内置） ───
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-redirect-from

# ─── 分页 ───
paginate: 10
paginate_path: "/blog/page:num/"

# ─── 集合 ───
collections:
  wiki:
    output: true
    permalink: /wiki/:name/
  faq:
    output: true
    permalink: /faq/:name/

# ─── 默认 Front Matter ───
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "龙猫云机场"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: wiki
    values:
      layout: wiki
  - scope:
      path: ""
      type: faq
    values:
      layout: faq

# ─── Feed / RSS ───
feed:
  path: /feed.xml

# ─── 包含目录 ───
include:
  - pages
  - .well-known

# ─── 排除 ───
exclude:
  - README.md
  - package.json
  - tailwind.config.js
  - postcss.config.js
  - node_modules
  - scripts/
  - prompts/
  - content/
  - Gemfile.lock
  - vendor
  - package-lock.json
  - yarn.lock

# ─── 固定链接 ───
permalink: /blog/:year/:month/:day/:title/
