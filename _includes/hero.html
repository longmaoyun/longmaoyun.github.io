<!-- Hero Section -->
<section class="relative min-h-screen flex items-center overflow-hidden bg-gradient-to-br from-blue-600 via-blue-700 to-purple-900 dark:from-[#0a1628] dark:via-[#0d1f3c] dark:to-[#1a0a2e]">
  <!-- Dynamic Background / Particles Placeholder -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <!-- Grid pattern overlay -->
    <div class="absolute inset-0 opacity-[0.03] dark:opacity-[0.08]" style="background-image: url(&quot;data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E&quot;);"></div>

    <!-- Gradient orbs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-400/20 dark:bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-400/20 dark:bg-purple-500/10 rounded-full blur-3xl"></div>

    <!-- Globe visualization placeholder -->
    <div class="absolute inset-0 flex items-center justify-center opacity-10 dark:opacity-5">
      <div class="relative w-[600px] h-[600px]">
        <div class="absolute inset-0 rounded-full border border-white/20 dark:border-blue-400/20 animate-pulse"></div>
        <div class="absolute inset-4 rounded-full border border-white/10 dark:border-blue-400/10"></div>
        <div class="absolute inset-8 rounded-full border border-white/5 dark:border-blue-400/5"></div>
        <!-- Globe lines placeholder -->
        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 600 600" fill="none">
          <ellipse cx="300" cy="300" rx="250" ry="250" stroke="currentColor" stroke-width="0.5" class="text-white/20 dark:text-blue-400/20"/>
          <ellipse cx="300" cy="300" rx="150" ry="250" stroke="currentColor" stroke-width="0.5" class="text-white/20 dark:text-blue-400/20"/>
          <ellipse cx="300" cy="300" rx="50" ry="250" stroke="currentColor" stroke-width="0.5" class="text-white/20 dark:text-blue-400/20"/>
          <line x1="50" y1="300" x2="550" y2="300" stroke="currentColor" stroke-width="0.5" class="text-white/20 dark:text-blue-400/20"/>
          <line x1="300" y1="50" x2="300" y2="550" stroke="currentColor" stroke-width="0.5" class="text-white/20 dark:text-blue-400/20"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="relative container mx-auto px-4 sm:px-6 lg:px-8 z-10">
    <div class="max-w-4xl mx-auto text-center">

      <!-- Badge -->
      <div class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-medium bg-white/10 dark:bg-blue-500/10 text-white/90 dark:text-blue-300 backdrop-blur-sm border border-white/10 dark:border-blue-400/20 mb-8" data-aos="fade-down" data-aos-delay="0">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse mr-2"></span>
        {{ site.hero_badge | default: '全球 50+ 节点 · 高速稳定' }}
      </div>

      <!-- Main Heading -->
      <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold text-white leading-tight mb-6" data-aos="fade-up" data-aos-delay="100">
        <span class="bg-gradient-to-r from-white via-blue-100 to-purple-200 dark:from-blue-100 dark:via-purple-200 dark:to-white bg-clip-text text-transparent">
          {{ site.hero_title | default: '突破网络限制' }}
        </span>
        <br>
        <span class="text-white/90 dark:text-blue-200">
          {{ site.hero_subtitle | default: '畅享全球互联' }}
        </span>
      </h1>

      <!-- Description -->
      <p class="text-lg sm:text-xl text-white/70 dark:text-blue-200/70 max-w-2xl mx-auto mb-10" data-aos="fade-up" data-aos-delay="200">
        {{ site.hero_description | default: '龙猫云为您提供高速、稳定、安全的网络加速服务。一键连接全球，畅享无障碍网络体验。' }}
      </p>

      <!-- CTA Buttons -->
      <div class="flex flex-col sm:flex-row justify-center gap-4 mb-16" data-aos="fade-up" data-aos-delay="300">
        <a href="{{ site.cta_url | default: '/pricing' | relative_url }}" class="group inline-flex items-center justify-center px-8 py-4 rounded-xl text-base font-semibold text-blue-900 dark:text-white bg-white dark:bg-blue-600 hover:bg-blue-50 dark:hover:bg-blue-700 shadow-2xl shadow-black/20 dark:shadow-blue-500/25 transition-all duration-300 hover:scale-105">
          立即使用
          <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
        </a>
        <a href="{{ '/download' | relative_url }}" class="group inline-flex items-center justify-center px-8 py-4 rounded-xl text-base font-semibold text-white bg-white/10 dark:bg-white/5 backdrop-blur-sm border border-white/20 dark:border-blue-400/30 hover:bg-white/20 dark:hover:bg-white/10 transition-all duration-300 hover:scale-105">
          <i class="fas fa-download mr-2"></i>
          下载客户端
        </a>
      </div>

      <!-- Stats Bar -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8" data-aos="fade-up" data-aos-delay="400">
        <div class="text-center">
          <div class="text-3xl sm:text-4xl font-bold text-white mb-1" x-init="let el = $el; let target = {{ site.stats_nodes | default: 50 }}; animateNumber(el, target)">0</div>
          <div class="text-sm text-white/60 dark:text-blue-200/60">全球节点</div>
        </div>
        <div class="text-center">
          <div class="text-3xl sm:text-4xl font-bold text-white mb-1" x-init="let el = $el; let target = {{ site.stats_users | default: 10000 }}; animateNumber(el, target)">0</div>
          <div class="text-sm text-white/60 dark:text-blue-200/60">活跃用户</div>
        </div>
        <div class="text-center">
          <div class="text-3xl sm:text-4xl font-bold text-white mb-1" x-init="let el = $el; let target = {{ site.stats_speed | default: 1000 }}; animateNumber(el, target)">0</div>
          <div class="text-sm text-white/60 dark:text-blue-200/60">峰值带宽 (Mbps)</div>
        </div>
        <div class="text-center">
          <div class="text-3xl sm:text-4xl font-bold text-white mb-1" x-init="let el = $el; let target = {{ site.stats_uptime | default: 99.9 }}; animateNumber(el, target)">0</div>
          <div class="text-sm text-white/60 dark:text-blue-200/60">正常运行率 (%)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom fade -->
  <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-white dark:from-[#0a1628] to-transparent"></div>
</section>

<script>
function animateNumber(el, target) {
  if (!el) return;
  let start = 0;
  let duration = 2000;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);
    // Ease out cubic
    let eased = 1 - Math.pow(1 - progress, 3);
    let current = Math.round(eased * target);
    el.textContent = current.toLocaleString();
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = target.toLocaleString();
    }
  }
  requestAnimationFrame(step);
}
</script>
