<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<!-- SEO -->
{% if page.excerpt %}
<meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}">
{% elsif page.description %}
<meta name="description" content="{{ page.description | escape }}">
{% else %}
<meta name="description" content="{{ site.description | escape }}">
{% endif %}

{% if page.tags %}
<meta name="keywords" content="{{ page.tags | join: ', ' | escape }}">
{% endif %}

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph -->
<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta property="og:locale" content="zh_CN">
{% if page.image %}
<meta property="og:image" content="{{ page.image | absolute_url }}">
{% else %}
<meta property="og:image" content="{{ site.image | default: '/assets/images/og-default.png' | absolute_url }}">
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
{% if page.image %}
<meta name="twitter:image" content="{{ page.image | absolute_url }}">
{% else %}
<meta name="twitter:image" content="{{ site.image | default: '/assets/images/og-default.png' | absolute_url }}">
{% endif %}

<!-- Theme Color -->
<meta name="theme-color" content="#2563eb">
<meta name="msapplication-TileColor" content="#0a1628">

<!-- Icons -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">

<!-- DNS Prefetch & Preconnect -->
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="https://www.googletagmanager.com">

<!-- RSS -->
{% if site.feed %}
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} RSS" href="{{ site.feed | relative_url }}">
{% else %}
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} RSS" href="{{ '/feed.xml' | relative_url }}">
{% endif %}

<!-- Preload main stylesheet -->
<link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style">
