{% if page.excerpt %}
<meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}">
{% elsif page.description %}
<meta name="description" content="{{ page.description | escape }}">
{% else %}
<meta name="description" content="{{ site.description | escape }}">
{% endif %}

{% if page.keywords %}
<meta name="keywords" content="{{ page.keywords | escape }}">
{% elsif page.tags %}
<meta name="keywords" content="{{ page.tags | join: ', ' | escape }}">
{% endif %}

<link rel="canonical" href="{{ page.url | absolute_url }}">

<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta property="og:locale" content="zh_CN">
{% if page.image %}
<meta property="og:image" content="{{ page.image | absolute_url }}">
{% else %}
<meta property="og:image" content="{{ site.logo | absolute_url }}">
{% endif %}

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
{% if page.image %}
<meta name="twitter:image" content="{{ page.image | absolute_url }}">
{% endif %}

<meta name="theme-color" content="#4f46e5">
<meta name="msapplication-TileColor" content="#0f172a">

<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="manifest" href="{{ '/manifest.json' | relative_url }}">

<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} RSS" href="{{ '/feed.xml' | relative_url }}">
