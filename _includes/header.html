<!-- Header / Navigation -->
<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" x-data="{ scrolled: false }" x-init="window.addEventListener('scroll', () => { scrolled = window.scrollY > 20; })" :class="scrolled ? 'bg-white/80 dark:bg-[#0a1628]/80 backdrop-blur-xl shadow-lg shadow-black/5 dark:shadow-black/20' : 'bg-transparent'">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">

      <!-- Logo -->
      <a href="{{ '/' | relative_url }}" class="flex items-center space-x-2 group">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-blue-500/25 group-hover:shadow-blue-500/40 transition-shadow">
          L
        </div>
        <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent">
          龙猫云
        </span>
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden lg:flex items-center space-x-1">
        {% if site.data.navigation %}
          {% for item in site.data.navigation %}
          <a href="{{ item.url | relative_url }}" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all duration-200 {% if page.url == item.url %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20{% endif %}">
            {% if item.icon %}<i class="{{ item.icon }} mr-1.5"></i>{% endif %}
            {{ item.title }}
          </a>
          {% endfor %}
        {% endif %}
      </nav>

      <!-- Right Actions -->
      <div class="flex items-center space-x-3">

        <!-- Dark Mode Toggle -->
        <button @click="darkMode = !darkMode" class="p-2.5 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50" aria-label="切换暗色模式">
          <i class="fas fa-sun text-lg" x-show="!darkMode"></i>
          <i class="fas fa-moon text-lg" x-show="darkMode" style="display: none;"></i>
        </button>

        <!-- CTA Button -->
        <a href="{{ site.cta_url | default: '/pricing' | relative_url }}" class="hidden sm:inline-flex items-center px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 transition-all duration-200">
          立即开始
          <i class="fas fa-arrow-right ml-2 text-xs"></i>
        </a>

        <!-- Mobile Hamburger -->
        <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden p-2.5 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50" aria-label="菜单">
          <i class="fas fa-bars text-lg" x-show="!mobileMenuOpen"></i>
          <i class="fas fa-times text-lg" x-show="mobileMenuOpen" style="display: none;"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div x-show="mobileMenuOpen" x-collapse.duration.300ms class="lg:hidden border-t border-gray-200 dark:border-gray-700/50 bg-white/95 dark:bg-[#0a1628]/95 backdrop-blur-xl">
    <div class="container mx-auto px-4 py-4 space-y-1">
      {% if site.data.navigation %}
        {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}" class="block px-4 py-3 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all {% if page.url == item.url %}text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20{% endif %}">
          {% if item.icon %}<i class="{{ item.icon }} mr-2"></i>{% endif %}
          {{ item.title }}
        </a>
        {% endfor %}
      {% endif %}
      <div class="pt-3 border-t border-gray-200 dark:border-gray-700/50">
        <a href="{{ site.cta_url | default: '/pricing' | relative_url }}" class="block w-full text-center px-5 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 transition-all">
          立即开始
          <i class="fas fa-arrow-right ml-2 text-xs"></i>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- Spacer for fixed header -->
<div class="h-16 md:h-20"></div>
