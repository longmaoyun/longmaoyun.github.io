<!-- FAQ Preview -->
<section id="faq" class="py-20 bg-gray-50 dark:bg-gray-900/50">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="section-title text-center mb-4">常见问题</h2>
    <p class="section-subtitle text-center mb-10">关于龙猫云机场的常见疑问解答</p>
    <div class="space-y-3" x-data="{ activeFaq: null }">
      
      <div class="card overflow-hidden">
        <button @click="activeFaq = activeFaq === 1 ? null : 1" class="flex items-center justify-between w-full p-4 text-left font-medium hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
          <span>龙猫云支持哪些设备？</span>
          <i class="fas fa-chevron-down text-gray-400 transition-transform" :class="{ 'rotate-180': activeFaq === 1 }"></i>
        </button>
        <div x-show="activeFaq === 1" x-collapse class="px-4 pb-4 text-sm text-gray-600 dark:text-gray-400">
          龙猫云支持全平台使用：Windows、macOS、Android、iOS、Linux。您可以在下载页面找到各平台对应的客户端及配置教程。
        </div>
      </div>

      <div class="card overflow-hidden">
        <button @click="activeFaq = activeFaq === 2 ? null : 2" class="flex items-center justify-between w-full p-4 text-left font-medium hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
          <span>如何开始使用龙猫云？</span>
          <i class="fas fa-chevron-down text-gray-400 transition-transform" :class="{ 'rotate-180': activeFaq === 2 }"></i>
        </button>
        <div x-show="activeFaq === 2" x-collapse class="px-4 pb-4 text-sm text-gray-600 dark:text-gray-400">
          注册账号 → 选择套餐 → 下载客户端 → 一键导入配置。详细的图文教程请查看<a href="{{ '/tutorial/' | relative_url }}" class="text-primary-600 dark:text-primary-400 hover:underline">使用教程</a>页面。
        </div>
      </div>

      <div class="card overflow-hidden">
        <button @click="activeFaq = activeFaq === 3 ? null : 3" class="flex items-center justify-between w-full p-4 text-left font-medium hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
          <span>支持退款吗？</span>
          <i class="fas fa-chevron-down text-gray-400 transition-transform" :class="{ 'rotate-180': activeFaq === 3 }"></i>
        </button>
        <div x-show="activeFaq === 3" x-collapse class="px-4 pb-4 text-sm text-gray-600 dark:text-gray-400">
          我们提供7天无理由退款保障。如果您在使用过程中遇到任何问题，请联系客服，我们将在24小时内处理您的退款申请。详细政策请查看<a href="{{ '/refund/' | relative_url }}" class="text-primary-600 dark:text-primary-400 hover:underline">退款政策</a>。
        </div>
      </div>

    </div>
    <div class="text-center mt-8">
      <a href="{{ '/faq/' | relative_url }}" class="inline-flex items-center text-primary-600 dark:text-primary-400 hover:underline font-medium">
        查看更多 FAQ <i class="fas fa-arrow-right ml-1 text-sm"></i>
      </a>
    </div>
  </div>
</section>
